# nginx as the CloudFront surrogate (ADR-0002).
# Caches, terminates TLS at 443, forwards to the Envoy NLB equivalent.

upstream envoy_fleet {
  server envoy-1:10000 max_fails=3 fail_timeout=10s;
  server envoy-2:10000 max_fails=3 fail_timeout=10s;
  server envoy-3:10000 max_fails=3 fail_timeout=10s;
  keepalive 32;
}

# Healthz on port 80 for the compose healthcheck.
server {
  listen 80 default_server;
  server_name _;

  location /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# Public-facing HTTPS, mirroring CloudFront behavior.
server {
  listen 443 ssl;
  http2 on;
  server_name _;

  ssl_certificate     /etc/nginx/tls/edge.crt;
  ssl_certificate_key /etc/nginx/tls/edge.key;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
  ssl_prefer_server_ciphers on;

  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header X-Request-ID $request_id;
  proxy_set_header Connection "";

  location / {
    proxy_pass http://envoy_fleet;
  }
}
