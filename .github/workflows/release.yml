name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  packages: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
        continue-on-error: true

  slsa:
    needs: release
    permissions:
      id-token: write
      contents: write
      actions: read
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.0.0
    strategy:
      matrix:
        image:
          - ghcr.io/gufranco/regnant/envoy-fleet
          - ghcr.io/gufranco/regnant/osb-api
          - ghcr.io/gufranco/regnant/osb-worker
          - ghcr.io/gufranco/regnant/sovereign
          - ghcr.io/gufranco/regnant/auth-sidecar
          - ghcr.io/gufranco/regnant/ratelimit
          - ghcr.io/gufranco/regnant/backend-jira-clone
          - ghcr.io/gufranco/regnant/backend-confluence-clone
          - ghcr.io/gufranco/regnant/backend-bitbucket-clone
          - ghcr.io/gufranco/regnant/cli
    with:
      image: ${{ matrix.image }}
      digest: ""
      registry-username: ${{ github.actor }}
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}
