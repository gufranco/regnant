name: trivy

on:
  workflow_run:
    workflows: ["build"]
    types: [completed]
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  packages: read

concurrency:
  group: trivy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  scan:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name != 'workflow_run' }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        image:
          - ghcr.io/gufranco/regnant/envoy-fleet
          - ghcr.io/gufranco/regnant/osb-api
          - ghcr.io/gufranco/regnant/osb-worker
          - ghcr.io/gufranco/regnant/sovereign
          - ghcr.io/gufranco/regnant/auth-sidecar
          - ghcr.io/gufranco/regnant/ratelimit
          - ghcr.io/gufranco/regnant/backend-jira-clone
          - ghcr.io/gufranco/regnant/backend-confluence-clone
          - ghcr.io/gufranco/regnant/backend-bitbucket-clone
          - ghcr.io/gufranco/regnant/cli
    steps:
      - uses: actions/checkout@v4

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ matrix.image }}:${{ github.ref_name }}
          format: sarif
          output: trivy.sarif
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Upload scan results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif
          category: trivy-${{ matrix.image }}
