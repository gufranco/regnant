name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  security-events: write
  actions: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    uses: ./.github/workflows/lint.yml
    secrets: inherit

  test:
    name: test
    uses: ./.github/workflows/test.yml
    secrets: inherit

  codeql:
    name: codeql
    uses: ./.github/workflows/codeql.yml
    secrets: inherit

  build:
    name: build
    needs: [lint, test]
    if: ${{ github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) }}
    uses: ./.github/workflows/build.yml
    secrets: inherit

  sign:
    name: sign
    needs: build
    if: ${{ github.event_name == 'push' }}
    uses: ./.github/workflows/sign.yml
    secrets: inherit

  sbom:
    name: sbom
    needs: build
    if: ${{ github.event_name == 'push' }}
    uses: ./.github/workflows/sbom.yml
    secrets: inherit

  trivy:
    name: trivy
    needs: build
    uses: ./.github/workflows/trivy.yml
    secrets: inherit

  summary:
    name: status check
    runs-on: ubuntu-24.04
    needs: [lint, test, codeql, build, trivy]
    if: ${{ always() }}
    steps:
      - name: Aggregate result
        env:
          LINT: ${{ needs.lint.result }}
          TEST: ${{ needs.test.result }}
          CODEQL: ${{ needs.codeql.result }}
          BUILD: ${{ needs.build.result }}
          TRIVY: ${{ needs.trivy.result }}
        run: |
          echo "lint=$LINT test=$TEST codeql=$CODEQL build=$BUILD trivy=$TRIVY"
          for status in "$LINT" "$TEST" "$CODEQL" "$BUILD" "$TRIVY"; do
            case "$status" in
              success|skipped) ;;
              *)
                echo "ci failed; one or more upstream jobs did not succeed" >&2
                exit 1
                ;;
            esac
          done
          echo "ci: all jobs succeeded or skipped"
