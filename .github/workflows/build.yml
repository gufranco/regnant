name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  packages: write
  attestations: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  images:
    name: build ${{ matrix.service }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: envoy-fleet
            context: ami/docker
          - service: osb-api
            context: services/osb
            target: api
          - service: osb-worker
            context: services/osb
            target: worker
          - service: sovereign
            context: services/sovereign
          - service: auth-sidecar
            context: services/auth-sidecar
          - service: ratelimit
            context: services/ratelimit
          - service: backend-jira-clone
            context: services/backend-jira-clone
          - service: backend-confluence-clone
            context: services/backend-confluence-clone
          - service: backend-bitbucket-clone
            context: services/backend-bitbucket-clone
          - service: cli
            context: services/cli
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image refs
        id: refs
        run: |
          echo "image=ghcr.io/${{ github.repository }}/${{ matrix.service }}" >> "$GITHUB_OUTPUT"

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ steps.refs.outputs.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          target: ${{ matrix.target || '' }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true
