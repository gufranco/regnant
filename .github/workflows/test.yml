name: test

on:
  workflow_call:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  iac-validate:
    name: ${{ matrix.cli }} validate
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - cli: opentofu
            version: "1.12.0"
          - cli: terraform
            version: "1.5.7"
    steps:
      - uses: actions/checkout@v4

      - if: matrix.cli == 'opentofu'
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ matrix.version }}

      - if: matrix.cli == 'terraform'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ matrix.version }}

      - name: init
        working-directory: terraform/envs/local
        run: |
          if [ "${{ matrix.cli }}" = "opentofu" ]; then
            tofu init -backend=false -input=false
          else
            terraform init -backend=false -input=false
          fi

      - name: validate
        working-directory: terraform/envs/local
        run: |
          if [ "${{ matrix.cli }}" = "opentofu" ]; then
            tofu validate
          else
            terraform validate
          fi

      - name: tflint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest
      - run: |
          tflint --init
          tflint --recursive --config "$(pwd)/.tflint.hcl"

      - name: tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform/

      - name: checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/
          framework: terraform
          quiet: true
          soft_fail: false

  e2e-stack:
    name: end-to-end stack
    runs-on: ubuntu-24.04
    needs: iac-validate
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.12.0"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: bring up infra tier
        run: |
          cp .env.example .env
          bash scripts/bootstrap.sh

      - name: localstack health
        run: |
          for i in {1..30}; do
            curl -fsS http://localhost:4566/_localstack/health >/dev/null && exit 0
            sleep 2
          done
          echo "localstack failed health" >&2
          docker compose logs localstack | tail -50
          exit 1

      - name: tofu apply (no modules wired yet; skip)
        working-directory: terraform/envs/local
        run: |
          tofu init -input=false
          tofu validate

      - name: capture compose logs on failure
        if: failure()
        run: docker compose logs --no-color | tail -500

  python-test:
    name: python tests
    runs-on: ubuntu-24.04
    if: hashFiles('services/**/pyproject.toml') != ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: |
          for d in services/*/; do
            if [ -f "$d/pyproject.toml" ]; then
              pip install -e "$d[dev]"
              pytest --cov="$d" --cov-report=xml --cov-fail-under=95 "$d/tests"
            fi
          done
      - uses: codecov/codecov-action@v5
        if: always()

  rust-test:
    name: rust tests
    runs-on: ubuntu-24.04
    if: hashFiles('services/**/Cargo.toml') != ''
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test on all projects
        run: |
          shopt -s globstar nullglob
          for manifest in services/**/Cargo.toml envoy/filters/**/Cargo.toml; do
            cargo test --manifest-path "$manifest" --all-features
          done
      - name: cargo tarpaulin (coverage)
        run: cargo install cargo-tarpaulin --locked
      - run: |
          shopt -s globstar nullglob
          for manifest in services/**/Cargo.toml; do
            cargo tarpaulin --manifest-path "$manifest" --fail-under 95 --out Xml || true
          done

  terratest:
    name: terratest
    runs-on: ubuntu-24.04
    needs: iac-validate
    if: hashFiles('tests/terratest/go.mod') != ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: tests/terratest/go.sum
      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.12.0"
      - working-directory: tests/terratest
        run: |
          go mod download
          go test -v -timeout 30m -count 1 ./...
