name: lint

on:
  workflow_call:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    name: pre-commit (all hooks)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v7
        with:
          python-version: "3.13"

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.12.0"

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.5.7"

      - name: Install pre-commit
        run: pipx install pre-commit

      - name: Cache pre-commit
        uses: actions/cache@v6
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run pre-commit on all files
        run: pre-commit run --all-files --show-diff-on-failure

  terraform-fmt:
    name: opentofu/terraform fmt
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.12.0"
      - run: tofu fmt -check -recursive terraform/

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.5.7"
      - run: terraform fmt -check -recursive terraform/

  shell:
    name: shellcheck
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: ludeeus/action-shellcheck@2.0.0
        env:
          SHELLCHECK_OPTS: -e SC1091

  actions:
    name: actionlint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: raven-actions/actionlint@v2

  hadolint:
    name: hadolint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true
          ignore: DL3008,DL3018

  yaml:
    name: yamllint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - run: pipx install yamllint
      - run: yamllint -c .yamllint.yaml .

  discover:
    name: discover language manifests
    runs-on: ubuntu-24.04
    outputs:
      has_python: ${{ steps.scan.outputs.has_python }}
      has_rust: ${{ steps.scan.outputs.has_rust }}
      has_go: ${{ steps.scan.outputs.has_go }}
    steps:
      - uses: actions/checkout@v7
      - id: scan
        run: |
          shopt -s globstar nullglob
          has_python=false
          has_rust=false
          has_go=false
          for _ in services/**/pyproject.toml; do has_python=true; break; done
          for _ in services/**/Cargo.toml envoy/filters/**/Cargo.toml; do has_rust=true; break; done
          if [ -f tests/terratest/go.mod ]; then has_go=true; fi
          {
            echo "has_python=$has_python"
            echo "has_rust=$has_rust"
            echo "has_go=$has_go"
          } >> "$GITHUB_OUTPUT"

  python-lint:
    name: python (ruff + mypy + pip-audit)
    runs-on: ubuntu-24.04
    needs: discover
    if: needs.discover.outputs.has_python == 'true'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.13"
      - run: pipx install ruff
      - run: ruff check services/ tests/ || true
      - run: ruff format --check services/ tests/ || true
      - run: pipx install pip-audit
      - run: |
          for d in services/*/; do
            if [ -f "$d/pyproject.toml" ]; then
              pip-audit -r "$d/requirements.txt" || true
            fi
          done

  rust-lint:
    name: rust (clippy + cargo-deny)
    runs-on: ubuntu-24.04
    needs: discover
    if: needs.discover.outputs.has_rust == 'true'
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: install protoc
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends protobuf-compiler
      - uses: Swatinem/rust-cache@v2
      - name: clippy on Rust services
        run: |
          shopt -s globstar nullglob
          for manifest in services/**/Cargo.toml; do
            cargo clippy --manifest-path "$manifest" --all-targets --all-features -- -D warnings
          done

      - name: clippy on WASM filters for wasm32-wasip1
        run: |
          rustup target add wasm32-wasip1
          shopt -s globstar nullglob
          for manifest in envoy/filters/**/Cargo.toml; do
            cargo clippy --manifest-path "$manifest" --target wasm32-wasip1 -- -D warnings
          done
      - name: cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          arguments: --all-features check
          manifest-path: services/cli/Cargo.toml
        continue-on-error: true

  go-lint:
    name: go (vet + govulncheck)
    runs-on: ubuntu-24.04
    needs: discover
    if: needs.discover.outputs.has_go == 'true'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache-dependency-path: tests/terratest/go.sum
      - working-directory: tests/terratest
        run: go vet ./...

      - working-directory: tests/terratest
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./... || true
