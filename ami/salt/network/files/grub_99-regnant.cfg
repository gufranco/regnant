# Kernel boot args for the Envoy host.
# Disable autonuma, disable the NMI watchdog, isolate CPU 0 for IRQs.
# The Profit-or-Poverty series details the why behind each flag.

GRUB_CMDLINE_LINUX_DEFAULT="quiet numa=off nmi_watchdog=0 audit=1 audit_backlog_limit=8192 transparent_hugepage=never default_hugepagesz=2M hugepagesz=2M hugepages=1024 isolcpus=managed_irq,domain,0 irqaffinity=0"
