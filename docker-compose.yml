# regnant local stack.
# Brings up LocalStack plus every supporting container.
# Service Dockerfiles are stubbed in Phase 1 and progressively replaced
# by the real implementations in their respective phases. See
# specs/2026-05-22-atlassian-platform-terraform/plan.md.
#
# Network layout:
#   regnant-data:        LocalStack, Redis, internal data paths
#   regnant-mesh:        OSB, Sovereign, Envoy, auth, ratelimit, backends
#   regnant-edge:        nginx (CloudFront surrogate), Envoy listener side
#   regnant-observe:     OTel collector, Prometheus, Grafana, Loki, Tempo, Promtail
#   regnant-identity:    Keycloak

name: regnant

x-common-restart: &common-restart
  restart: unless-stopped

x-common-security: &common-security
  security_opt:
    - no-new-privileges:true
  read_only: true
  cap_drop:
    - ALL

x-common-logging: &common-logging
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

x-healthcheck-defaults: &healthcheck-defaults
  interval: 10s
  timeout: 5s
  retries: 10
  start_period: 30s

networks:
  regnant-data:
    name: regnant-data
    driver: bridge
  regnant-mesh:
    name: regnant-mesh
    driver: bridge
  regnant-edge:
    name: regnant-edge
    driver: bridge
  regnant-observe:
    name: regnant-observe
    driver: bridge
  regnant-identity:
    name: regnant-identity
    driver: bridge

volumes:
  localstack-data: {}
  redis-data: {}
  keycloak-data: {}
  prometheus-data: {}
  grafana-data: {}
  loki-data: {}
  tempo-data: {}
  promtail-positions: {}

services:
  localstack:
    image: localstack/localstack:4.0.3
    container_name: regnant-localstack
    <<: [*common-restart, *common-logging]
    environment:
      DEBUG: "0"
      PERSISTENCE: "1"
      SERVICES: >-
        s3,sqs,dynamodb,ec2,iam,route53,acm,kms,cloudformation,cloudfront,
        cloudwatch,logs,sts,elbv2,autoscaling,ssm,secretsmanager
      LS_LOG: warn
      DOCKER_HOST: unix:///var/run/docker.sock
      LAMBDA_EXECUTOR: docker
      HOSTNAME_EXTERNAL: localstack
      EXTRA_CORS_ALLOWED_ORIGINS: "*"
    ports:
      - "4566:4566"
      - "4571:4571"
    volumes:
      - localstack-data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - regnant-data
      - regnant-mesh
      - regnant-observe
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:4566/_localstack/health"]
      <<: *healthcheck-defaults
    mem_limit: 2g
    cpus: 2.0

  redis:
    image: redis:7.4.1-alpine
    container_name: regnant-redis
    <<: [*common-restart, *common-security, *common-logging]
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - "256mb"
      - --maxmemory-policy
      - allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - regnant-data
      - regnant-mesh
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      <<: *healthcheck-defaults
    mem_limit: 384m
    cpus: 0.5
    user: "999:999"

  keycloak:
    image: quay.io/keycloak/keycloak:25.0.6
    container_name: regnant-keycloak
    <<: [*common-restart, *common-logging]
    environment:
      KC_DB: dev-file
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-changeme}
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_LOG_LEVEL: INFO
    command:
      - start-dev
      - --import-realm
    volumes:
      - keycloak-data:/opt/keycloak/data
      - ./identity/keycloak:/opt/keycloak/data/import:ro
    ports:
      - "8090:8080"
    networks:
      - regnant-identity
      - regnant-mesh
      - regnant-observe
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && grep -q '200 OK' <&3"]
      <<: *healthcheck-defaults
    mem_limit: 1g
    cpus: 1.0
    security_opt:
      - no-new-privileges:true

  nginx:
    image: nginx:1.27-alpine
    container_name: regnant-nginx-edge
    <<: [*common-restart, *common-logging]
    volumes:
      - ./edge/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./edge/conf.d:/etc/nginx/conf.d:ro
      - ./security/ca:/etc/nginx/tls:ro
    ports:
      - "8443:443"
      - "8081:80"
    networks:
      - regnant-edge
      - regnant-mesh
    tmpfs:
      - /var/cache/nginx
      - /var/run
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/healthz"]
      <<: *healthcheck-defaults
    mem_limit: 128m
    cpus: 0.25
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETUID
      - SETGID

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.115.1
    container_name: regnant-otel-collector
    <<: [*common-restart, *common-security, *common-logging]
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ./observability/otel-collector.yaml:/etc/otel-collector.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8888:8888"
      - "13133:13133"
    networks:
      - regnant-observe
      - regnant-mesh
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:13133/"]
      <<: *healthcheck-defaults
    mem_limit: 384m
    cpus: 1.0
    user: "10001:10001"

  prometheus:
    image: prom/prometheus:v3.0.1
    container_name: regnant-prometheus
    <<: [*common-restart, *common-logging]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
      - --web.enable-lifecycle
      - --web.enable-remote-write-receiver
      - --enable-feature=native-histograms
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - regnant-observe
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      <<: *healthcheck-defaults
    mem_limit: 512m
    cpus: 1.0
    security_opt:
      - no-new-privileges:true
    user: "65534:65534"

  grafana:
    image: grafana/grafana:11.4.0
    container_name: regnant-grafana
    <<: [*common-restart, *common-logging]
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: ""
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - regnant-observe
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      <<: *healthcheck-defaults
    mem_limit: 384m
    cpus: 0.75
    security_opt:
      - no-new-privileges:true
    user: "472:472"

  loki:
    image: grafana/loki:3.3.1
    container_name: regnant-loki
    <<: [*common-restart, *common-logging]
    command: ["-config.file=/etc/loki/config.yaml"]
    volumes:
      - ./observability/loki/loki-config.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    networks:
      - regnant-observe
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      <<: *healthcheck-defaults
    mem_limit: 512m
    cpus: 1.0
    security_opt:
      - no-new-privileges:true
    user: "10001:10001"

  tempo:
    image: grafana/tempo:2.6.1
    container_name: regnant-tempo
    <<: [*common-restart, *common-logging]
    command: ["-config.file=/etc/tempo/config.yaml"]
    volumes:
      - ./observability/tempo/tempo-config.yaml:/etc/tempo/config.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"
      - "9095:9095"
    networks:
      - regnant-observe
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3200/ready || exit 1"]
      <<: *healthcheck-defaults
    mem_limit: 512m
    cpus: 1.0
    security_opt:
      - no-new-privileges:true
    user: "10001:10001"

  promtail:
    image: grafana/promtail:3.3.1
    container_name: regnant-promtail
    <<: [*common-restart, *common-logging]
    command: ["-config.file=/etc/promtail/config.yaml"]
    volumes:
      - ./observability/promtail/promtail-config.yaml:/etc/promtail/config.yaml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail-positions:/var/lib/promtail
    networks:
      - regnant-observe
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9080/ready || exit 1"]
      <<: *healthcheck-defaults
    mem_limit: 256m
    cpus: 0.5
    security_opt:
      - no-new-privileges:true

  sovereign:
    image: regnant/sovereign:local
    build:
      context: ./services/sovereign
      dockerfile: Dockerfile
    container_name: regnant-sovereign
    <<: [*common-restart, *common-logging]
    environment:
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: ${REGION_LABEL:-us-east-1}
      SOVEREIGN_CONFIG: /etc/sovereign/config.yaml
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: sovereign
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./services/sovereign/config.yaml:/etc/sovereign/config.yaml:ro
      - ./services/sovereign/templates:/etc/sovereign/templates:ro
      - ./services/sovereign/plugins:/etc/sovereign/plugins:ro
    ports:
      - "8000:8080"
    depends_on:
      localstack:
        condition: service_healthy
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_healthy
    networks:
      - regnant-mesh
      - regnant-data
      - regnant-observe
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/version || exit 1"]
      <<: *healthcheck-defaults
    mem_limit: 512m
    cpus: 1.0
    security_opt:
      - no-new-privileges:true
    user: "10001:10001"

  auth-sidecar:
    image: regnant/auth-sidecar:local
    build:
      context: ./services/auth-sidecar
      dockerfile: Dockerfile
    container_name: regnant-auth-sidecar
    <<: [*common-restart, *common-security, *common-logging]
    environment:
      KEYCLOAK_REALM_URL: http://keycloak:8080/realms/regnant
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: auth-sidecar
      RUST_LOG: info
    ports:
      - "9191:9191"
    depends_on:
      keycloak:
        condition: service_healthy
    networks:
      - regnant-mesh
      - regnant-identity
      - regnant-observe
    healthcheck:
      test: ["CMD", "/auth-sidecar", "healthcheck"]
      <<: *healthcheck-defaults
    mem_limit: 128m
    cpus: 0.5
    user: "10001:10001"

  ratelimit:
    image: regnant/ratelimit:local
    build:
      context: ./services/ratelimit
      dockerfile: Dockerfile
    container_name: regnant-ratelimit
    <<: [*common-restart, *common-security, *common-logging]
    environment:
      USE_STATSD: "false"
      LOG_LEVEL: info
      REDIS_SOCKET_TYPE: tcp
      REDIS_URL: redis:6379
      RUNTIME_ROOT: /data
      RUNTIME_SUBDIRECTORY: ratelimit
      RUNTIME_WATCH_ROOT: "false"
      RUNTIME_IGNOREDOTFILES: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: ratelimit
    volumes:
      - ./services/ratelimit/config:/data/ratelimit/config:ro
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_healthy
    networks:
      - regnant-mesh
      - regnant-data
      - regnant-observe
    mem_limit: 256m
    cpus: 0.5
    user: "10001:10001"

  osb-api:
    image: regnant/osb:local
    build:
      context: ./services/osb
      dockerfile: Dockerfile
      target: api
    container_name: regnant-osb-api
    <<: [*common-restart, *common-logging]
    environment:
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: ${REGION_LABEL:-us-east-1}
      OSB_BROKER_USERNAME: ${OSB_BROKER_USERNAME:-broker}
      OSB_BROKER_PASSWORD: ${OSB_BROKER_PASSWORD:-changeme}
      OSB_ARTIFACT_BUCKET: regnant-osb-artifacts
      OSB_INSTANCES_TABLE: regnant-service-instances
      OSB_BINDINGS_TABLE: regnant-service-bindings
      OSB_PROVISION_QUEUE_URL: http://localstack:4566/000000000000/regnant-provision-tasks
      OSB_BINDING_QUEUE_URL: http://localstack:4566/000000000000/regnant-binding-tasks
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: osb-api
      LOG_LEVEL: info
    ports:
      - "8080:8080"
    depends_on:
      localstack:
        condition: service_healthy
      otel-collector:
        condition: service_healthy
    networks:
      - regnant-mesh
      - regnant-data
      - regnant-observe
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/health || exit 1"]
      <<: *healthcheck-defaults
    mem_limit: 384m
    cpus: 0.75
    security_opt:
      - no-new-privileges:true
    user: "10001:10001"

  osb-worker:
    image: regnant/osb:local
    build:
      context: ./services/osb
      dockerfile: Dockerfile
      target: worker
    container_name: regnant-osb-worker
    <<: [*common-restart, *common-logging]
    environment:
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: ${REGION_LABEL:-us-east-1}
      OSB_ARTIFACT_BUCKET: regnant-osb-artifacts
      OSB_INSTANCES_TABLE: regnant-service-instances
      OSB_BINDINGS_TABLE: regnant-service-bindings
      OSB_PROVISION_QUEUE_URL: http://localstack:4566/000000000000/regnant-provision-tasks
      OSB_BINDING_QUEUE_URL: http://localstack:4566/000000000000/regnant-binding-tasks
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: osb-worker
      LOG_LEVEL: info
    depends_on:
      localstack:
        condition: service_healthy
      otel-collector:
        condition: service_healthy
    networks:
      - regnant-mesh
      - regnant-data
      - regnant-observe
    mem_limit: 256m
    cpus: 0.5
    security_opt:
      - no-new-privileges:true
    user: "10001:10001"

  backend-jira-clone:
    image: regnant/backend-jira-clone:local
    build:
      context: ./services/backend-jira-clone
      dockerfile: Dockerfile
    container_name: regnant-backend-jira-clone
    <<: [*common-restart, *common-logging]
    environment:
      BACKEND_NAME: jira-clone
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: backend-jira-clone
      LOG_LEVEL: info
    networks:
      - regnant-mesh
      - regnant-observe
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/health || exit 1"]
      <<: *healthcheck-defaults
    mem_limit: 256m
    cpus: 0.5
    security_opt:
      - no-new-privileges:true
    user: "10001:10001"

  backend-confluence-clone:
    image: regnant/backend-confluence-clone:local
    build:
      context: ./services/backend-confluence-clone
      dockerfile: Dockerfile
    container_name: regnant-backend-confluence-clone
    <<: [*common-restart, *common-logging]
    environment:
      BACKEND_NAME: confluence-clone
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: backend-confluence-clone
      LOG_LEVEL: info
    networks:
      - regnant-mesh
      - regnant-observe
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/health || exit 1"]
      <<: *healthcheck-defaults
    mem_limit: 256m
    cpus: 0.5
    security_opt:
      - no-new-privileges:true
    user: "10001:10001"

  backend-bitbucket-clone:
    image: regnant/backend-bitbucket-clone:local
    build:
      context: ./services/backend-bitbucket-clone
      dockerfile: Dockerfile
    container_name: regnant-backend-bitbucket-clone
    <<: [*common-restart, *common-logging]
    environment:
      BACKEND_NAME: bitbucket-clone
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: backend-bitbucket-clone
      LOG_LEVEL: info
    networks:
      - regnant-mesh
      - regnant-observe
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/health || exit 1"]
      <<: *healthcheck-defaults
    mem_limit: 256m
    cpus: 0.5
    security_opt:
      - no-new-privileges:true
    user: "10001:10001"

  envoy-1:
    image: regnant/envoy-fleet:local
    build:
      context: ./ami/docker
      dockerfile: Dockerfile
    container_name: regnant-envoy-1
    <<: [*common-restart, *common-logging]
    environment:
      ENVOY_NODE_ID: envoy-1
      ENVOY_NODE_CLUSTER: regnant-fleet
      ENVOY_REGION: ${REGION_LABEL:-us-east-1}
      SOVEREIGN_XDS_URL: sovereign:8080
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    volumes:
      - ./envoy/bootstrap.yaml.tmpl:/etc/envoy/bootstrap.yaml.tmpl:ro
    ports:
      - "10000:10000"
      - "9901:9901"
    depends_on:
      sovereign:
        condition: service_healthy
    networks:
      - regnant-mesh
      - regnant-edge
      - regnant-observe
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9901/ready || exit 1"]
      <<: *healthcheck-defaults
    mem_limit: 512m
    cpus: 1.0
    security_opt:
      - no-new-privileges:true
    user: "10001:10001"

  envoy-2:
    image: regnant/envoy-fleet:local
    build:
      context: ./ami/docker
      dockerfile: Dockerfile
    container_name: regnant-envoy-2
    <<: [*common-restart, *common-logging]
    environment:
      ENVOY_NODE_ID: envoy-2
      ENVOY_NODE_CLUSTER: regnant-fleet
      ENVOY_REGION: ${REGION_LABEL:-us-east-1}
      SOVEREIGN_XDS_URL: sovereign:8080
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    volumes:
      - ./envoy/bootstrap.yaml.tmpl:/etc/envoy/bootstrap.yaml.tmpl:ro
    ports:
      - "10001:10000"
    depends_on:
      sovereign:
        condition: service_healthy
    networks:
      - regnant-mesh
      - regnant-edge
      - regnant-observe
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9901/ready || exit 1"]
      <<: *healthcheck-defaults
    mem_limit: 512m
    cpus: 1.0
    security_opt:
      - no-new-privileges:true
    user: "10001:10001"

  envoy-3:
    image: regnant/envoy-fleet:local
    build:
      context: ./ami/docker
      dockerfile: Dockerfile
    container_name: regnant-envoy-3
    <<: [*common-restart, *common-logging]
    environment:
      ENVOY_NODE_ID: envoy-3
      ENVOY_NODE_CLUSTER: regnant-fleet
      ENVOY_REGION: ${REGION_LABEL:-us-east-1}
      SOVEREIGN_XDS_URL: sovereign:8080
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    volumes:
      - ./envoy/bootstrap.yaml.tmpl:/etc/envoy/bootstrap.yaml.tmpl:ro
    ports:
      - "10002:10000"
    depends_on:
      sovereign:
        condition: service_healthy
    networks:
      - regnant-mesh
      - regnant-edge
      - regnant-observe
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9901/ready || exit 1"]
      <<: *healthcheck-defaults
    mem_limit: 512m
    cpus: 1.0
    security_opt:
      - no-new-privileges:true
    user: "10001:10001"
